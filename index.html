<!DOCTYPE html>

<html>

<head>

  <title>AI Viral Dashboard V3</title>

  <style>

    body{

      font-family: Arial;

      background:#0f172a;

      color:white;

      text-align:center;

      padding:20px;

    }

    .box{

      background:#1e293b;

      padding:20px;

      margin:10px auto;

      width:90%;

      max-width:800px;

      border-radius:12px;

    }

    input{

      width:85%;

      padding:10px;

      margin:8px;

      border-radius:8px;

      border:none;

    }

    button{

      padding:10px 20px;

      background:#22c55e;

      border:none;

      border-radius:8px;

      font-weight:bold;

      cursor:pointer;

    }

    .output{

      text-align:left;

      white-space:pre-line;

      margin-top:10px;

    }

  </style>

</head>

<body>

<h1>🚀 AI VIRAL VIDEO ENGINE V3</h1>

<div class="box">

  <input id="title" placeholder="Video Title">

  <input id="genre" placeholder="Genre (Suspense / History / Sci-fi)">

  <input id="concept" placeholder="Core Concept">

  <br><br>

  <button onclick="generate()">Generate Viral Script</button>

</div>

<div class="box">

  <h2>📊 VIRAL OUTPUT</h2>

  <div id="out" class="output"></div>

</div>

<script>

function generate(){

let t = document.getElementById("title").value || "Untitled Story";

let g = document.getElementById("genre").value || "General";

let c = document.getElementById("concept").value || "No concept";

let hook = `⚡ STOP SCROLLING...`;

let emotionalHook = `This is something you were never told about ${c}...`;

let script = `

🎬 TITLE: ${t}

📚 GENRE: ${g}

🔥 VIRAL HOOK:

${hook}

🧠 EMOTIONAL OPENING:

${emotionalHook}

✍️ STORY SCRIPT:

Long ago, everything was normal...

But then ${c} changed everything forever...

Nobody expected what happened next...

History took a shocking turn...

🎬 SCENE FLOW:

1. Shock Hook (0-3 sec)

2. Mystery Question

3. Rising Conflict

4. Big Twist

5. Emotional Ending

📈 VIRAL TITLE IDEAS:

- You Won’t Believe the Truth of ${t}

- The Dark Secret Behind ${c}

- This Changed Everything Forever

🔥 HASHTAGS:

#viral #story #history #ai #youtube #shorts

`;

document.getElementById("out").innerText = script;
}
</script>

</body>
</html>
